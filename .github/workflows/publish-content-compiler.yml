name: Publish content compiler

on:
  push:
    tags:
      - "garden-content-compiler-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-content-compiler-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            native_file: garden-content-compiler.darwin-arm64.node
            setup_zig: false
          - platform: linux-x64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            native_file: garden-content-compiler.linux-x64-gnu.node
            setup_zig: false
          - platform: linux-x64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            native_file: garden-content-compiler.linux-x64-musl.node
            setup_zig: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        if: matrix.setup_zig
        uses: mlugg/setup-zig@v2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate release tag
        run: node -e "const pkg=require('./packages/content-compiler-napi/package.json'); const tag=process.env.GITHUB_REF_NAME; const expected='garden-content-compiler-v'+pkg.version; if(tag!==expected){throw new Error('Tag '+tag+' does not match '+expected)} for (const [name, version] of Object.entries(pkg.optionalDependencies || {})) { if (version !== pkg.version) throw new Error(name+' optional dependency version '+version+' does not match '+pkg.version); }"

      - name: Build native binding
        if: ${{ !matrix.setup_zig }}
        working-directory: packages/content-compiler-napi
        run: pnpm exec napi build --platform --release --no-js --dts native.d.ts --target ${{ matrix.target }}

      - name: Build native binding with Zig
        if: ${{ matrix.setup_zig }}
        working-directory: packages/content-compiler-napi
        run: pnpm exec napi build --platform --release --no-js --dts native.d.ts --target ${{ matrix.target }} --cross-compile

      - name: Verify native artifact
        working-directory: packages/content-compiler-napi
        run: test -f "${{ matrix.native_file }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: packages/content-compiler-napi/${{ matrix.native_file }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate release tag
        run: node -e "const pkg=require('./packages/content-compiler-napi/package.json'); const tag=process.env.GITHUB_REF_NAME; const expected='garden-content-compiler-v'+pkg.version; if(tag!==expected){throw new Error('Tag '+tag+' does not match '+expected)} for (const [name, version] of Object.entries(pkg.optionalDependencies || {})) { if (version !== pkg.version) throw new Error(name+' optional dependency version '+version+' does not match '+pkg.version); }"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: packages/content-compiler-napi
          merge-multiple: true

      - name: Verify downloaded artifacts
        working-directory: packages/content-compiler-napi
        run: |
          test -f garden-content-compiler.darwin-arm64.node
          test -f garden-content-compiler.linux-x64-gnu.node
          test -f garden-content-compiler.linux-x64-musl.node

      - name: Build JavaScript package
        run: pnpm --filter @elecmonkey/garden-content-compiler exec rslib build

      - name: Prepare platform packages
        working-directory: packages/content-compiler-napi
        run: |
          pnpm exec napi create-npm-dirs
          pnpm exec napi artifacts --output-dir .
          pnpm exec napi pre-publish --no-gh-release --skip-optional-publish

      - name: Verify package files
        working-directory: packages/content-compiler-napi
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f npm/darwin-arm64/garden-content-compiler.darwin-arm64.node
          test -f npm/linux-x64-gnu/garden-content-compiler.linux-x64-gnu.node
          test -f npm/linux-x64-musl/garden-content-compiler.linux-x64-musl.node

      - name: Verify versions are unpublished
        working-directory: packages/content-compiler-napi
        run: |
          node --input-type=module <<'NODE'
          import { spawnSync } from 'node:child_process';
          import fs from 'node:fs';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const packages = [
            ...Object.keys(pkg.optionalDependencies || {}),
            pkg.name,
          ];

          for (const name of packages) {
            const spec = `${name}@${pkg.version}`;
            const result = spawnSync('npm', ['view', spec, 'version'], {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
            });

            if (result.status === 0) {
              throw new Error(`${spec} is already published.`);
            }

            const output = `${result.stdout}\n${result.stderr}`;
            if (!output.includes('E404')) {
              throw new Error(`Unable to verify ${spec}: ${output}`);
            }
          }
          NODE

      - name: Publish darwin-arm64 package
        working-directory: packages/content-compiler-napi/npm/darwin-arm64
        run: npm publish --provenance --access public

      - name: Publish linux-x64-gnu package
        working-directory: packages/content-compiler-napi/npm/linux-x64-gnu
        run: npm publish --provenance --access public

      - name: Publish linux-x64-musl package
        working-directory: packages/content-compiler-napi/npm/linux-x64-musl
        run: npm publish --provenance --access public

      - name: Publish main package
        working-directory: packages/content-compiler-napi
        run: npm publish --provenance --access public
